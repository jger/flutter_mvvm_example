name: app
description: "MVVM todo demo with Riverpod 3, fake backend, and feature-oriented structure."
publish_to: 'none'
version: 1.1.0

environment:
  sdk: ^3.10.0

dependencies:
  easy_localization: ^3.0.7+1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3
  hooks_riverpod: ^3.0.3
  go_router: ^14.8.1
  material_symbols_icons: ^4.2906.0
  riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.13.1
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
