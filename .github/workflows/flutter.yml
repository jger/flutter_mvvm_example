name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - name: Flutter version (FVM)
        id: fvm
        working-directory: app
        run: echo "flutter_version=$(jq -r '.flutterSdkVersion' .fvm/fvm_config.json)" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.flutter_version }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: dart run tool/check_translation_keys.dart
      - name: Linux desktop deps (integration_test)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build libgtk-3-dev liblzma-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter test test --coverage --exclude-tags golden
      - run: flutter test integration_test -d linux
      - uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: ${{ github.workspace }}/app/coverage/lcov.info
          min_coverage: 75
          exclude: "**/*.g.dart"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: app/coverage/lcov.info
