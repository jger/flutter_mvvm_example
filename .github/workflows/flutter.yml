name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: write

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - name: Flutter version (FVM)
        id: fvm
        working-directory: app
        run: echo "flutter_version=$(jq -r '.flutterSdkVersion' .fvm/fvm_config.json)" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.flutter_version }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: dart run tool/check_translation_keys.dart
      # Same toolchain as docker/integration-tests/Dockerfile (Linux desktop embedder build).
      - name: Linux desktop deps (integration_test)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev libglu1-mesa \
            xvfb
      - run: flutter config --enable-linux-desktop
      - run: flutter precache --linux
      - run: flutter test test --coverage --exclude-tags golden
      - name: Integration tests (xvfb — headless display for GTK)
        run: xvfb-run -a flutter test integration_test -d linux
      - uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: ${{ github.workspace }}/app/coverage/lcov.info
          min_coverage: 75
          exclude: "**/*.g.dart"
      - name: Line coverage % from LCOV
        id: lcov
        run: |
          pct=$(awk -F: '/^LF:/ { lf += $2 } /^LH:/ { lh += $2 } END { if (lf < 1) { print 0; exit } printf "%d", int(lh * 100 / lf + 0.5) }' coverage/lcov.info)
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
      - name: Coverage badge (gist / shields endpoint)
        # Kein secrets in if (IDE/Schema); Fork-PRs ausgeschlossen → GIST_SECRET nur bei push/internem PR.
        if: ${{ vars.COVERAGE_GIST_ID != '' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: "${{ steps.lcov.outputs.pct }}%"
          style: flat
          valColorRange: ${{ steps.lcov.outputs.pct }}
          minColorRange: 60
          maxColorRange: 75
      - name: Coverage badge README hint
        if: always()
        env:
          GIST_ID: ${{ vars.COVERAGE_GIST_ID }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$GIST_ID" ]; then
            echo "### Coverage badge" >> "$GITHUB_STEP_SUMMARY"
            echo "Set repository variable **COVERAGE_GIST_ID** and secret **GIST_SECRET** (PAT, \`gist\` scope). Until then the README placeholder URL returns **resource not found**." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          RAW="https://gist.githubusercontent.com/${OWNER}/${GIST_ID}/raw/coverage.json"
          ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$RAW")
          echo "### Coverage badge — paste into README" >> "$GITHUB_STEP_SUMMARY"
          echo '```markdown' >> "$GITHUB_STEP_SUMMARY"
          echo "![coverage](https://img.shields.io/endpoint?url=${ENC})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Check [raw JSON](${RAW}) (expect \`schemaVersion\` after upload)." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: app/coverage/lcov.info
